openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Forum API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: categories
    description: Forum category operations
  - name: threads
    description: Forum thread operations
  - name: posts
    description: Forum post operations
  - name: users
    description: User profile operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCategoriesResponse"

  /categories/{categoryId}/threads:
    get:
      operationId: listThreads
      tags: [threads]
      summary: List threads in a category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of threads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListThreadsResponse"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createThread
      tags: [threads]
      summary: Create a new thread
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadBody"
      responses:
        "201":
          description: Thread created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thread"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threads/{threadId}:
    get:
      operationId: getThread
      tags: [threads]
      summary: Get a thread by ID
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Thread details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thread"
        "404":
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threads/{threadId}/posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts in a thread
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPostsResponse"
        "404":
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post (reply) in a thread
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{username}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get a user's public profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/profile:
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/avatar:
    post:
      operationId: uploadAvatar
      tags: [users]
      summary: Upload avatar image as base64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadAvatarBody"
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
        password:
          type: string
          minLength: 8
      required:
        - username
        - password

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - createdAt

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        threadCount:
          type: integer
        postCount:
          type: integer
      required:
        - id
        - name
        - description
        - threadCount
        - postCount

    ListCategoriesResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
      required:
        - categories

    Thread:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        categoryId:
          type: integer
        authorId:
          type: integer
        authorUsername:
          type: string
        authorDisplayName:
          type: string
          nullable: true
        authorAvatarUrl:
          type: string
          nullable: true
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        lastPostAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - categoryId
        - authorId
        - authorUsername
        - postCount
        - createdAt
        - lastPostAt

    ListThreadsResponse:
      type: object
      properties:
        threads:
          type: array
          items:
            $ref: "#/components/schemas/Thread"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - threads
        - total
        - page
        - limit

    CreateThreadBody:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        content:
          type: string
          minLength: 1
      required:
        - title
        - content

    Post:
      type: object
      properties:
        id:
          type: integer
        threadId:
          type: integer
        authorId:
          type: integer
        authorUsername:
          type: string
        authorDisplayName:
          type: string
          nullable: true
        authorAvatarUrl:
          type: string
          nullable: true
        content:
          type: string
        parentPostId:
          type: integer
          nullable: true
        parentPostAuthorUsername:
          type: string
          nullable: true
        parentPostContent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - threadId
        - authorId
        - authorUsername
        - content
        - createdAt

    ListPostsResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - posts
        - total
        - page
        - limit

    CreatePostBody:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        parentPostId:
          type: integer
          nullable: true
      required:
        - content

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        postCount:
          type: integer
        threadCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - postCount
        - threadCount
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 50
          nullable: true
        bio:
          type: string
          maxLength: 500
          nullable: true

    UploadAvatarBody:
      type: object
      properties:
        imageData:
          type: string
          description: Base64-encoded image data URI (e.g. data:image/png;base64,...)
      required:
        - imageData

    AvatarResponse:
      type: object
      properties:
        avatarUrl:
          type: string
      required:
        - avatarUrl
